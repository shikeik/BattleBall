<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<!-- 强制无缓存：自动生成时间戳，确保每次加载最新代码 -->
	<script>
		(function() {
			window.BUILD_VERSION = "1.0.0.1";  // 手动更新版本号
			
			const url = new URL(location.href);
			const urlTime = parseInt(url.searchParams.get('t')) || 0;
			const urlVersion = url.searchParams.get('v');
			const now = Date.now();
			
			// 情况1: 首次访问（无时间戳）- 添加时间戳
			if (!urlTime) {
				url.searchParams.set('v', window.BUILD_VERSION);
				url.searchParams.set('t', now);
				location.replace(url.toString());
				return;
			}
			
			// 情况2: 版本号变化 - 强制刷新
			if (urlVersion && urlVersion !== window.BUILD_VERSION) {
				url.searchParams.set('v', window.BUILD_VERSION);
				url.searchParams.set('t', now);
				location.replace(url.toString());
				return;
			}
			
			// 情况3: 用户主动刷新（F5/刷新按钮）且超过5秒
			const isReload = performance.navigation && performance.navigation.type === 1;
			if (isReload && (now - urlTime > 5000)) {
				url.searchParams.set('v', window.BUILD_VERSION);
				url.searchParams.set('t', now);
				location.replace(url.toString());
				return;
			}
			
			// 正常使用现有时间戳
			window.CACHE_BUSTER = urlTime;
		})();
	</script>
	<title>New Game</title>
	<link rel="stylesheet" href="css/main.css">
</head>
<body style="margin:0;padding:0;background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;">
	<canvas id="gameCanvas" style="display:block;"></canvas>
	
	<!-- UI层：初始隐藏，加载完成后显示 -->
	<div id="ui-layer" style="visibility: hidden;">
		<!-- 游戏UI将在这里添加 -->
	</div>

	<!-- 加载流程脚本 -->
	<script>
	(function() {
		const cacheBuster = window.CACHE_BUSTER || Date.now();
		
		// 第一阶段：加载加载器自身
		function loadLoader() {
			return new Promise((resolve, reject) => {
				const script = document.createElement('script');
				script.src = 'js/loading-screen.js?t=' + cacheBuster;
				script.onload = resolve;
				script.onerror = reject;
				document.head.appendChild(script);
			});
		}
		
		// 第二阶段：加载脚本加载器
		function loadScriptLoader() {
			return new Promise((resolve, reject) => {
				const script = document.createElement('script');
				script.src = 'js/script-loader.js?t=' + cacheBuster;
				script.onload = resolve;
				script.onerror = reject;
				document.head.appendChild(script);
			});
		}
		
		// 主加载流程
		async function main() {
			try {
				// 1. 先加载加载器
				await loadLoader();
				await loadScriptLoader();
				
				// 2. 创建加载场景
				const loading = new LoadingScreen();
				const loader = new ScriptLoader();
				
				// 3. 注册基础框架加载任务
				// UI层级系统
				loading.registerTask('UI Layers', async () => {
					await loader.loadBatch(SCRIPT_GROUPS.ui, (p, s) => loading.updateProgress(p * 0.2, s));
				}, 20);
				
				// 日志系统
				loading.registerTask('Logger', async () => {
					await loader.loadBatch(SCRIPT_GROUPS.logger, (p, s) => loading.updateProgress(20 + p * 0.3, s));
				}, 30);
				
				// 工具栏
				loading.registerTask('Toolbar', async () => {
					await loader.loadBatch(SCRIPT_GROUPS.toolbar, (p, s) => loading.updateProgress(50 + p * 0.15, s));
				}, 15);
				
				// WebGPU 演示
				loading.registerTask('WebGPU Demo', async () => {
					await loader.loadBatch(SCRIPT_GROUPS.webgpuDemo, (p, s) => loading.updateProgress(65 + p * 0.1, s));
				}, 10);
				
				// 屏幕管理系统
				loading.registerTask('Screen System', async () => {
					await loader.loadBatch(SCRIPT_GROUPS.screen, (p, s) => loading.updateProgress(75 + p * 0.1, s));
				}, 10);
				
				// 游戏屏幕
				loading.registerTask('Game Screens', async () => {
					await loader.loadBatch(SCRIPT_GROUPS.screens, (p, s) => loading.updateProgress(85 + p * 0.15, s));
				}, 15);
				
				// 4. 加载完成回调
				loading.onComplete = () => {
					try {
						// 输出版本信息
						if (window.logger) {
							logger.log('system', (window.BUILD_VERSION || 'unknown') + ' | ' + cacheBuster);
						}
						
						// 初始化工具栏
						if (window.Toolbar) {
							window.toolbar = new Toolbar();
						}
						
						// 初始化屏幕管理器
						initScreenManager();
						
						if (window.logger) {
							logger.log('system', 'Framework loaded, screen system ready');
						}
					} catch (e) {
						document.body.innerHTML = '<pre style="color:red;padding:20px;font-size:14px;">onComplete Error: ' + e.message + '\n\nStack: ' + e.stack + '</pre>';
						throw e;
					}
				};
				
				// 5. 开始加载
				await loading.start();
				
			} catch (e) {
				console.error('Loading failed:', e);
				document.body.style.margin = '0';
				document.body.style.padding = '0';
				document.body.style.cssText = 'margin:0;padding:0;overflow:auto;height:auto;min-height:100vh;';
				document.body.innerHTML = '<div style="color:#f00;text-align:center;padding:20px;font-family:monospace;background:#1a1a1a;min-height:100vh;"><h2 style="margin:0 0 20px 0;">⚠️ Loading Failed</h2><pre style="text-align:left;background:#222;padding:20px;margin:0 auto;max-width:800px;white-space:pre-wrap;word-break:break-all;font-size:13px;line-height:1.6;color:#ff6b6b;border:1px solid #444;border-radius:8px;">' + e.message + '\n\n' + (e.stack || '') + '</pre><p style="margin:20px 0;color:#888;">Please refresh to retry</p></div>';
			}
		}
		
		// 场景管理器初始化函数
		function initScreenManager() { try {
			const canvas = document.getElementById('gameCanvas');
			if (!canvas) {
				if (window.logger) logger.log('SCREEN', 'Canvas not found');
				return;
			}
			
			// 设置 canvas 尺寸
			function resizeCanvas() {
				const size = Math.min(window.innerWidth, window.innerHeight) * 0.9;
				canvas.width = size;
				canvas.height = size;
				canvas.style.width = size + 'px';
				canvas.style.height = size + 'px';
			}
			resizeCanvas();
			window.addEventListener('resize', resizeCanvas);
			
			if (!window.ScreenManager) {
				if (window.logger) logger.log('SCREEN', 'ScreenManager not loaded');
				return;
			}
			
			// 创建屏幕管理器
			const screenManager = new ScreenManager();
			window.screenManager = screenManager;
			
			// 注册屏幕
			screenManager.register(MenuScreen);
			screenManager.register(WebGPUScreen);
			screenManager.register(SettingsScreen);
			
			// 设置启动屏幕
			screenManager.setLaunchScreen(MenuScreen);
			
			// 添加工具栏按钮
			if (window.toolbar) {
				window.toolbar.addToolButton({
					id: 'screenInfo',
					icon: '⊞',
					page: 0,
					onClick: () => {
						if (window.screenManager) {
							const info = window.screenManager.getStackInfo();
							if (window.logger) logger.log('SCREEN', `Stack: ${info}`);
						}
					}
				});
			}
			
			// 主循环
			let lastTime = performance.now();
			function loop() {
				const now = performance.now();
				const delta = (now - lastTime) / 1000;
				lastTime = now;
				
				screenManager.render(delta);
				requestAnimationFrame(loop);
			}
			loop();
			
			// 返回键处理
			document.addEventListener('keydown', (e) => {
				if (e.key === 'Escape' || e.key === 'Backspace') {
					if (window.screenManager && window.screenManager.handleBack()) {
						e.preventDefault();
					}
				}
			});
			
			if (window.logger) logger.log('SCREEN', 'Screen manager initialized');
			} catch (e) {
				document.body.innerHTML = '<pre style="color:red;padding:20px;font-size:14px;">Error: ' + e.message + '\n\nStack: ' + e.stack + '</pre>';
				throw e;
			}
		}
		
		// 启动
		main();
	})();
	</script>
</body>
</html>
