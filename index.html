<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<!-- 强制无缓存：自动生成时间戳，确保每次加载最新代码 -->
	<script>
		(function() {
			window.BUILD_VERSION = "1.0.0.0";  // 手动更新版本号
			
			const url = new URL(location.href);
			const urlTime = parseInt(url.searchParams.get('t')) || 0;
			const urlVersion = url.searchParams.get('v');
			const now = Date.now();
			
			// 情况1: 首次访问（无时间戳）- 添加时间戳
			if (!urlTime) {
				url.searchParams.set('v', window.BUILD_VERSION);
				url.searchParams.set('t', now);
				location.replace(url.toString());
				return;
			}
			
			// 情况2: 版本号变化 - 强制刷新
			if (urlVersion && urlVersion !== window.BUILD_VERSION) {
				url.searchParams.set('v', window.BUILD_VERSION);
				url.searchParams.set('t', now);
				location.replace(url.toString());
				return;
			}
			
			// 情况3: 用户主动刷新（F5/刷新按钮）且超过5秒
			const isReload = performance.navigation && performance.navigation.type === 1;
			if (isReload && (now - urlTime > 5000)) {
				url.searchParams.set('v', window.BUILD_VERSION);
				url.searchParams.set('t', now);
				location.replace(url.toString());
				return;
			}
			
			// 正常使用现有时间戳
			window.CACHE_BUSTER = urlTime;
		})();
	</script>
	<title>New Game</title>
	<link rel="stylesheet" href="css/main.css">
</head>
<body>
	<canvas id="gameCanvas"></canvas>
	
	<!-- UI层：初始隐藏，加载完成后显示 -->
	<div id="ui-layer" style="visibility: hidden;">
		<!-- 游戏UI将在这里添加 -->
	</div>

	<!-- 加载流程脚本 -->
	<script>
	(function() {
		const cacheBuster = window.CACHE_BUSTER || Date.now();
		
		// 第一阶段：加载加载器自身
		function loadLoader() {
			return new Promise((resolve, reject) => {
				const script = document.createElement('script');
				script.src = 'js/loading-screen.js?t=' + cacheBuster;
				script.onload = resolve;
				script.onerror = reject;
				document.head.appendChild(script);
			});
		}
		
		// 第二阶段：加载脚本加载器
		function loadScriptLoader() {
			return new Promise((resolve, reject) => {
				const script = document.createElement('script');
				script.src = 'js/script-loader.js?t=' + cacheBuster;
				script.onload = resolve;
				script.onerror = reject;
				document.head.appendChild(script);
			});
		}
		
		// 主加载流程
		async function main() {
			try {
				// 1. 先加载加载器
				await loadLoader();
				await loadScriptLoader();
				
				// 2. 创建加载场景
				const loading = new LoadingScreen();
				const loader = new ScriptLoader();
				
				// 3. 注册基础框架加载任务
				// UI层级系统
				loading.registerTask('UI Layers', async () => {
					await loader.loadBatch(SCRIPT_GROUPS.ui, (p, s) => loading.updateProgress(p * 0.2, s));
				}, 20);
				
				// 日志系统
				loading.registerTask('Logger', async () => {
					await loader.loadBatch(SCRIPT_GROUPS.logger, (p, s) => loading.updateProgress(20 + p * 0.3, s));
				}, 30);
				
				// 工具栏
				loading.registerTask('Toolbar', async () => {
					await loader.loadBatch(SCRIPT_GROUPS.toolbar, (p, s) => loading.updateProgress(50 + p * 0.3, s));
				}, 30);
				
				// WebGPU 演示
				loading.registerTask('WebGPU Demo', async () => {
					await loader.loadBatch(SCRIPT_GROUPS.webgpuDemo, (p, s) => loading.updateProgress(80 + p * 0.2, s));
				}, 20);
				
				// 4. 加载完成回调
				loading.onComplete = () => {
					// 输出版本信息
					if (window.logger) {
						logger.log('system', (window.BUILD_VERSION || 'unknown') + ' | ' + cacheBuster);
					}
					
					// 初始化工具栏
					if (window.Toolbar) {
						window.toolbar = new Toolbar();
					}
					
					// 初始化 WebGPU 演示
					initWebGPUDemo();
					
					if (window.logger) {
						logger.log('system', 'Framework loaded, WebGPU demo ready');
					}
				};
				
				// 5. 开始加载
				await loading.start();
				
			} catch (e) {
				console.error('Loading failed:', e);
				document.body.innerHTML = '<div style="color:#f00;text-align:center;padding:50px;">Failed to load. Please refresh.</div>';
			}
		}
		
		// WebGPU 演示初始化函数
		async function initWebGPUDemo() {
			const canvas = document.getElementById('gameCanvas');
			if (!canvas) {
				if (window.logger) logger.log('WEBGPU', 'Canvas not found');
				return;
			}
			
			// 设置 canvas 尺寸
			canvas.width = Math.min(window.innerWidth, window.innerHeight) * 0.9;
			canvas.height = canvas.width;
			
			if (!window.WebGPUDemo) {
				if (window.logger) logger.log('WEBGPU', 'WebGPUDemo class not loaded');
				return;
			}
			
			try {
				const demo = new WebGPUDemo(canvas);
				await demo.init();
				demo.start();
				window.webgpuDemo = demo;
				
				// 添加工具栏按钮控制演示
				if (window.toolbar) {
					window.toolbar.addToolButton({
						id: 'webgpuToggle',
						icon: '■',
						page: 0,
						onClick: () => {
							if (window.webgpuDemo) {
								window.webgpuDemo.stop();
								if (window.logger) logger.log('WEBGPU', 'Demo stopped by user');
							}
						}
					});
				}
			} catch (e) {
				if (window.logger) logger.log('WEBGPU', 'Failed to init demo', { error: e.message });
			}
		}
		
		// 启动
		main();
	})();
	</script>
</body>
</html>
